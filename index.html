  <!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ball Click Game</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }
    #score, #timer {
      position: absolute;
      left: 10px;
      font-size: 32px;
      font-weight: bold;
    }
    #score { top: 10px; }
    #timer { top: 50px; }#startBtn {
  position: absolute;
  top: 100px;
  left: 10px;
  padding: 10px 20px;
  font-size: 20px;
  cursor: pointer;
  border: none;
  border-radius: 8px;
  background: limegreen;
  color: white;
}

#ball {
  position: absolute;
  width: 100px;
  height: 100px;
  background: red;
  border-radius: 50%;
  cursor: pointer;
  display: none;
}

  </style>
</head>
<body>
  <div id="score">Score: 0</div>
  <div id="timer">Time: 0s</div>
  <button id="startBtn">Start Game</button>
  <div id="ball"></div>  <script>
    const ball = document.getElementById("ball");
    const scoreText = document.getElementById("score");
    const timerText = document.getElementById("timer");
    const startBtn = document.getElementById("startBtn");

    let score = 0;
    let time = 0;
    let gameInterval = null;
    let timerInterval = null;

    function moveBall() {
      const maxX = window.innerWidth - 100;
      const maxY = window.innerHeight - 100;

      const randomX = Math.random() * maxX;
      const randomY = Math.random() * maxY;

      ball.style.left = randomX + "px";
      ball.style.top = randomY + "px";
    }

    ball.addEventListener("click", () => {
      score++;
      scoreText.innerText = "Score: " + score;
      moveBall();
    });

    function startGame() {
      // STOP previous loops completely
      if (gameInterval) clearInterval(gameInterval);
      if (timerInterval) clearInterval(timerInterval);

      // RESET values
      score = 0;
      time = 0;
      scoreText.innerText = "Score: 0";
      timerText.innerText = "Time: 0s";

      ball.style.display = "block";

      // START fresh loops (fixed speed)
      gameInterval = setInterval(moveBall, 1000);

      timerInterval = setInterval(() => {
        time++;
        timerText.innerText = "Time: " + time + "s";
      }, 1000);
    }

    startBtn.addEventListener("click", startGame);
  </script></body>
</html>
